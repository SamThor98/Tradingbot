<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f5f1e8" />
    <title>Trading Cockpit — Old Logan Capital</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23f5f1e8'/><text x='50' y='70' text-anchor='middle' font-family='Georgia,serif' font-weight='700' font-size='64' fill='%231a3a2e'>O</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,400&family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
    <link rel="stylesheet" href="/static/overhaul.css" />
    <link rel="stylesheet" href="/static/readability.css" />
    <style>
      /* Old Logan light editorial cockpit (cream / forest / gold) */
      .cockpit-shell { max-width: none; margin: 0 auto; padding: 14px clamp(16px, 2.4vw, 40px) 48px; }
      .cockpit-head { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
      .cockpit-head h1 { font-family: "Fraunces", Georgia, serif; font-size: 1.25rem; margin: 8px 0; }
      .cockpit-head .muted { font-size: 0.85rem; }
      .cockpit-grid {
        display: grid; gap: 14px; margin-top: 12px;
        grid-template-columns: 1fr 1fr; grid-template-rows: auto auto;
      }
      @media (max-width: 1100px) { .cockpit-grid { grid-template-columns: 1fr; } }
      .lane { border: 1px solid var(--ol-border, rgba(26,26,26,0.12)); border-radius: 8px; padding: 12px; background: var(--ol-surface, #fffefb); min-height: 180px; }
      .lane h2 { font-family: "Fraunces", Georgia, serif; font-size: 0.98rem; margin: 0 0 8px; display: flex; align-items: center; gap: 8px; }
      .lane h2 .lane-prov { margin-left: auto; font-size: 0.72rem; font-weight: 400; opacity: 0.85; }
      .prov-badge { font-size: 0.7rem; padding: 1px 6px; border-radius: 4px; border: 1px solid currentColor; }
      .prov-high { color: #2d5a4a; } .prov-medium { color: #8a6d1f; } .prov-low { color: #b23b3b; }
      .stale-dot { color: #b23b3b; font-weight: 700; }
      .opp-row { display: grid; grid-template-columns: 64px 1fr auto auto; gap: 8px; align-items: center; padding: 6px 4px; border-bottom: 1px solid var(--ol-border, rgba(26,26,26,0.12)); cursor: pointer; }
      .opp-row:hover { background: rgba(26,26,26,0.04); }
      .opp-row .tk { font-weight: 700; }
      .opp-row .rank { font-variant-numeric: tabular-nums; opacity: 0.9; }
      .pill { font-size: 0.7rem; padding: 1px 6px; border-radius: 4px; }
      .pill.good { background: rgba(45,90,74,0.14); color: #2d5a4a; }
      .pill.bad { background: rgba(201,73,73,0.14); color: #b23b3b; }
      .pill.warn { background: rgba(201,169,98,0.18); color: #8a6d1f; }
      .pill.muted { background: rgba(90,90,90,0.12); color: #5a5a5a; }
      .kv { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 1px dashed rgba(26,26,26,0.12); font-size: 0.85rem; }
      .kv span:last-child { font-variant-numeric: tabular-nums; }
      .regime-bull { color: #2d5a4a; } .regime-bear { color: #b23b3b; } .regime-neutral { color: #8a6d1f; }
      .drawer { position: fixed; top: 0; right: 0; width: min(520px, 96vw); height: 100%; background: var(--ol-surface, #fffefb); border-left: 1px solid var(--ol-border, rgba(26,26,26,0.12)); box-shadow: -8px 0 24px rgba(0,0,0,0.18); transform: translateX(100%); transition: transform 0.2s ease; overflow-y: auto; z-index: 50; }
      .drawer.open { transform: translateX(0); }
      .drawer-inner { padding: 16px; }
      .drawer h3 { font-family: "Fraunces", Georgia, serif; margin: 4px 0 12px; }
      .drawer .close { float: right; cursor: pointer; opacity: 0.7; }
      .change-strip { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; font-size: 0.75rem; }
      .change-chip { padding: 2px 8px; border-radius: 4px; border: 1px solid var(--ol-border, rgba(26,26,26,0.12)); }
      .change-chip b { font-variant-numeric: tabular-nums; }
      .preview-box { border: 1px solid var(--ol-border, rgba(26,26,26,0.12)); border-radius: 6px; padding: 10px; margin-top: 10px; }
      .toolbar { display: flex; gap: 8px; align-items: center; }
      .btn { cursor: pointer; }
    </style>
  </head>
  <body data-theme="editorial">
    <div class="cockpit-shell">
      <div class="cockpit-head">
        <h1>🛰️ Trading Cockpit</h1>
        <div class="toolbar">
          <button class="btn small secondary" id="cockpitReviewBtn" type="button" title="Weekly learning diagnostics and tuning proposals"><span id="cockpitReview">🧠 Review</span></button>
          <span class="muted" id="cockpitUpdated">—</span>
          <button class="btn small secondary" id="cockpitRefresh" type="button">Refresh</button>
          <a class="btn small secondary" href="/">Full dashboard</a>
        </div>
      </div>

      <div class="cockpit-grid">
        <section class="lane" id="laneMarket">
          <h2>Market Regime <span class="lane-prov" data-prov="market"></span></h2>
          <div id="marketBody" data-async-state="idle"></div>
        </section>

        <section class="lane" id="lanePortfolio">
          <h2>Portfolio Risk + Exposure <span class="lane-prov" data-prov="portfolio"></span></h2>
          <div id="portfolioBody" data-async-state="idle"></div>
        </section>

        <section class="lane" id="laneOpportunities">
          <h2>Ranked Opportunities <span class="lane-prov" data-prov="opportunities"></span></h2>
          <div id="oppChangeStrip" class="change-strip"></div>
          <div id="opportunitiesBody" data-async-state="idle"></div>
        </section>

        <section class="lane" id="laneBlotter">
          <h2>Execution Blotter <span class="lane-prov" data-prov="blotter"></span></h2>
          <div id="blotterQualityStrip" class="change-strip"></div>
          <div id="blotterBody" data-async-state="idle"></div>
        </section>
      </div>
    </div>

    <aside class="drawer" id="cockpitDrawer" aria-hidden="true">
      <div class="drawer-inner">
        <span class="close" id="drawerClose" role="button" aria-label="Close">✕</span>
        <div id="drawerBody"></div>
      </div>
    </aside>

    <script type="module" src="/static/cockpit.js"></script>
  </body>
</html>
